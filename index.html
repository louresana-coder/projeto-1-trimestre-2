<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
        body {
            margin: 0;
        }
        header {
            background-color: darkolivegreen;
            color: floralwhite;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        main {
            background-color: floralwhite;
            color: darkolivegreen;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            
        }
        article{ display: flex;
        }
        img {
            width: 80px;
            height: 80px;
        }
        .artigo-autor {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu Blog</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia</p>
    </header>
    <main>
        
<article>
    <img src="https://img.icons8.com/fluency/96/laptop.png" alt="Computador">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Ana Laura</p>
            <p>Neste blog vou compartilhar conhecimentos e curiosidades sobre tecnologia.</p>
            <button>❤️<span>0</span></button>
            <button>👍<span>0</span></button>
        </div>
</article>

<article>
        <img src="https://img.icons8.com/fluency/96/laptop.png" alt="Computador">
        <div>
            <h2>Meu primeiro post</h2>
            <p class="artigo-autor">Por: Ana Laura</p>
            <p>Neste blog vou compartilhar conhecimentos e curiosidades sobre tecnologia.</p>
            <button>❤️<span>0</span></button>
            <button>👍<span>0</span></button>
        </div>
</article>
    </main>
    <script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(botao => {
        botao.addEventListener("click", botaoClicado);
    });

    function botaoClicado(evento) {
        const botao = evento.currentTarget;
        let texto = botao.querySelector("span");
        texto.textContent++;
    }
</script>
</body>
</html>
